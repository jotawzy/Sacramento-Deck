<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mestre</title>

<link rel="stylesheet" href="Css/style.css">
<link rel="stylesheet" href="Css/mestre.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

<div class="painel">

    <div class="icone">
        <i class="fa-solid fa-crown"></i>
    </div>

    <div class="campoSenha">

    <input
    type="password"
    id="senhaMestre"
    placeholder="Senha do Mestre">

    <button
    type="button"
    id="botaoMostrarSenha"
    class="botaoOlho">

        <i class="fa-solid fa-eye"></i>

    </button>

</div>

    <p class="mensagemErro"
    id="erroSenhaMestre"></p>

    <button
    id="botaoEntrarMestre"
    class="botaoCriar">

        Entrar

    </button>

</div>

<script src="Js/sala.js"></script>

</body>
</html>
