<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sacramento Deck - Painel do Mestre</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Painel do Mestre</h1>
        
        <div class="botoes-controle">
            <button id="btn-nova-rodada" class="btn">Nova Rodada</button>
            <button id="btn-limpar-tudo" class="btn btn-perigo">Limpar Tudo</button>
        </div>

        <div class="painel-principal">
            <div class="bloco-tabela">
                <h2>Ordem de Iniciativa</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Personagem</th>
                            <th>Carta Puxada</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-corpo">
                        <tr>
                            <td colspan="2" style="text-align:center; color:#888;">Carregando dados...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="bloco-historico">
                <h2>Histórico da Mesa</h2>
                <div id="log-iniciativas" class="caixa-log"></div>
            </div>
        </div>
    </div>

    <!-- Vinculação crucial como módulo JS -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
    <div class="historico">

        <h2>Deck Livre</h2>

        <div id="historicoDeck"></div>

        <hr>


        <h2>Histórico das Iniciativas</h2>

        <div id="historicoIniciativa"></div>

        <hr>


        <h2>Ordem da Rodada</h2>

        <div id="tabelaIniciativa"></div>

        <hr>

        <h2>Controle da Mesa</h2>

        <button
        id="botaoReiniciarIniciativa"
        class="botaoControle">
            Reiniciar Iniciativas
        </button>

        <button
        id="botaoNovaRodada"
        class="botaoControle">
            Nova Rodada
        </button>

        <button
        id="botaoLimparHistorico"
        class="botaoControle">
            Limpar Todo Histórico
        </button>

        <button
        id="botaoLimparDeck"
        class="botaoControle">
            Limpar Histórico do Deck
        </button>

        <button
        id="botaoLimparIniciativa"
        class="botaoControle">
            Limpar Histórico das Iniciativas
        </button>

    </div>
</div>

<script type="module" src="Js/firebase.js"></script>
<script type="module" src="Js/deck.js"></script>
<script type="module" src="Js/cartas.js"></script>
<script type="module" src="Js/iniciativa.js"></script>
<script type="module" src="js/app.js"></script>
    
</body>
