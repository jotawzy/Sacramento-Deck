<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala do Jogador</title>

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="Css/style.css">
    <link rel="stylesheet" href="Css/jogador.css">
</head>
<body>

<div class="sala">

    <div class="topoSala">
        <h2 id="nomeJogadorTopo"></h2>
    </div>


    <!-- ABAS -->
    <div class="abas">

        <button class="aba" id="botaoDeck">
            <i class="fa-solid fa-cards-blank"></i>
            Deck Livre
        </button>

        <button class="aba" id="botaoIniciativa">
            <i class="fa-solid fa-khanda"></i>
            Iniciativa
        </button>

    </div>


    <!-- DECK LIVRE -->
    <div id="deckLivre">

        <div class="areaCartas" id="areaCartas">
        </div>

        <button class="acaoPrincipal" id="botaoComprar">
            Comprar Carta
        </button>

    </div>


    <!-- PAINEL DE INICIATIVA -->
    <div id="painelIniciativa">

        <h3>Iniciativa</h3>

        <div class="controleIniciativa">

            <p>Quantidade de cartas</p>

            <input
                type="number"
                id="quantidadeCartas"
                value="2"
                min="1"
                max="10">

        </div>

        <button
            class="acaoPrincipal"
            id="botaoIniciativaComprar">

            Tirar Iniciativa

        </button>


        <div
            class="areaCartas"
            id="cartasIniciativa">

        </div>

    </div>

</div>

<!-- SCRIPTS -->

<script type="module" src="Js/firebase.js"></script>
<script type="module" src="Js/deck.js"></script>
<script type="module" src="Js/cartas.js"></script>
<script type="module" src="Js/iniciativa.js"></script>
<script type="module" src="Js/app.js"></script>

</body>
</html>
